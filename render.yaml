services:
  - type: web
    name: professional-portfolio
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/professional-portfolio-1.0.0.jar
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m
      - key: PORT
        value: 8080
